<!DOCTYPE html>

<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Settings - HR Pulse</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#2563eb",
                        background: "#faf8ff",
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../../shared/css/styles.css">
    <link rel="stylesheet" href="page.css">
</head>
<body class="text-slate-900 antialiased overflow-hidden">
<div class="flex h-screen overflow-hidden">
<!-- SIDEBAR -->
<aside class="sidebar">
<div class="logo">
<div class="logo-icon">
<span class="material-symbols-outlined">corporate_fare</span>
</div>
<div class="logo-text">
<h2>Corporate EMS</h2>
<p>HR Administration</p>
</div>
</div>
<ul class="nav-menu" id="sidebar-menu"></ul>
</aside>
<!-- MAIN -->
<div class="ml-[280px] flex-1 flex flex-col min-h-screen overflow-hidden">
<!-- TOP HEADER -->

<header
    class="fixed top-0 left-0 right-0 z-50 h-16 bg-white border-b border-slate-200 shadow-sm flex items-center justify-between px-6">

    <div class="flex items-center gap-4">

        <button id="sidebarToggle"
            class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-700">menu</span>
        </button>
        <h1 class="text-lg font-bold text-slate-800" id="page-header-title">
            Corporate EMS
        </h1>

    </div>

    <div class="flex items-center gap-3">

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">notifications</span>
        </button>

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">settings</span>
        </button>

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">help</span>
        </button>

        <div class="h-8 w-px bg-slate-200 mx-1"></div>

        <div class="flex items-center gap-3">
            <div class="hidden sm:block text-right">
                <p class="text-sm font-bold text-slate-900">Alex Rivera</p>
                <p class="text-[11px] text-slate-500">HR Manager</p>
            </div>

            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold">
                AR
            </div>
        </div>

    </div>
</header>

<aside id="sidebar"
    class="fixed top-16 left-0 z-40 h-[calc(100vh-64px)] w-[280px]
           bg-white border-r border-slate-200 shadow-xl
           transition-transform duration-300 ease-in-out
           -translate-x-full">

    <div class="h-full overflow-y-auto p-5">
        <ul class="nav-menu flex flex-col gap-2" id="sidebar-menu"></ul>
    </div>
</aside>

<div id="sidebarOverlay"
    class="fixed inset-0 bg-black/40 z-30 hidden top-16"></div>

<!-- CONTENT -->
<main class="flex-1 overflow-y-auto p-8">
<!-- PAGE TITLE -->
<div class="mb-8">
<h2 class="text-3xl font-bold mb-2">
                        Profile Settings
                    </h2>
<p class="text-slate-500">
                        Manage your personal information, security preferences, and documents.
                    </p>
</div>
<!-- SETTINGS GRID -->
<div class="grid grid-cols-12 gap-6">
<!-- TABS -->
<div class="col-span-12 lg:col-span-3">
<div class="space-y-3">
<button class="w-full flex items-center gap-3 px-4 py-4 bg-blue-50 text-primary rounded-2xl font-semibold">
<span class="material-symbols-outlined">
                                    person
                                </span>

                                Personal Info

                            </button>
<button class="w-full flex items-center gap-3 px-4 py-4 bg-white hover:bg-slate-50 rounded-2xl border border-slate-200 text-slate-600 font-medium transition">
<span class="material-symbols-outlined">
                                    shield
                                </span>

                                Security

                            </button>
<button class="w-full flex items-center gap-3 px-4 py-4 bg-white hover:bg-slate-50 rounded-2xl border border-slate-200 text-slate-600 font-medium transition">
<span class="material-symbols-outlined">
                                    description
                                </span>

                                Documents

                            </button>
<button class="w-full flex items-center gap-3 px-4 py-4 bg-white hover:bg-slate-50 rounded-2xl border border-slate-200 text-slate-600 font-medium transition">
<span class="material-symbols-outlined">
                                    notifications_active
                                </span>

                                Notifications

                            </button>
</div>
</div>
<!-- MAIN CONTENT -->
<div class="col-span-12 lg:col-span-9 space-y-6">
<!-- PERSONAL INFO -->
<div class="bg-white rounded-3xl border border-slate-100 p-8">
<div class="flex flex-col md:flex-row gap-8">
<!-- PROFILE -->
<div class="text-center">
<div class="w-32 h-32 mx-auto rounded-3xl overflow-hidden border-4 border-white shadow-lg">
<img class="w-full h-full object-cover" src="https://i.pravatar.cc/300?img=5"/>
</div>
<button class="mt-4 text-primary text-sm font-semibold flex items-center gap-2 mx-auto">
<span class="material-symbols-outlined">
                                            photo_camera
                                        </span>

                                        Change Photo

                                    </button>
</div>
<!-- FORM -->
<div class="flex-1 space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-medium mb-2">
                                                Full Name
                                            </label>
<input class="w-full border border-slate-300 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary outline-none" type="text" value="Sarah Jenkins"/>
</div>
<div>
<label class="block text-sm font-medium mb-2">
                                                Phone Number
                                            </label>
<input class="w-full border border-slate-300 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary outline-none" type="tel" value="+1 (555) 987-6543"/>
</div>
</div>
<div>
<label class="block text-sm font-medium mb-2">
                                            Residential Address
                                        </label>
<textarea class="w-full border border-slate-300 rounded-3xl px-5 py-4 h-24 focus:ring-2 focus:ring-primary outline-none">123 Corporate Lane, San Francisco, CA</textarea>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block text-sm font-medium mb-2">
                                                Emergency Contact Name
                                            </label>
<input class="w-full border border-slate-300 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary outline-none" type="text"/>
</div>
<div>
<label class="block text-sm font-medium mb-2">
                                                Emergency Contact Phone
                                            </label>
<input class="w-full border border-slate-300 rounded-2xl px-5 py-4 focus:ring-2 focus:ring-primary outline-none" type="tel"/>
</div>
</div>
<button class="px-8 py-4 bg-primary text-white rounded-2xl font-semibold hover:bg-blue-700 transition">

                                        Save Changes

                                    </button>
</div>
</div>
</div>
</div>
</div>
</main>
</div>
</div>
    <script src="../../shared/js/utils.js"></script>

    <script src="../../shared/js/sidebar.js"></script>
</body>
</html>
