<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Salary Slips - HR Pulse</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Shared CSS -->

    <script>
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                primary: "#2563eb"
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="../../shared/css/styles.css">
    <link rel="stylesheet" href="page.css">
</head>

<body class="font-body-md text-on-surface antialiased overflow-hidden">
<div class="flex h-screen overflow-hidden">
<!-- MAIN CONTENT -->
    <main class="main-content flex-1 overflow-y-auto pt-16">

        
<header
    class="fixed top-0 left-0 right-0 z-50 h-16 bg-white border-b border-slate-200 shadow-sm flex items-center justify-between px-6">

    <div class="flex items-center gap-4">

        <button id="sidebarToggle"
            class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-700">menu</span>
        </button>
        <h1 class="text-lg font-bold text-slate-800" id="page-header-title">
            Corporate EMS
        </h1>

    </div>

    <div class="flex items-center gap-3">

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">notifications</span>
        </button>

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">settings</span>
        </button>

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">help</span>
        </button>

        <div class="h-8 w-px bg-slate-200 mx-1"></div>

        <div class="flex items-center gap-3">
            <div class="hidden sm:block text-right">
                <p class="text-sm font-bold text-slate-900">Alex Rivera</p>
                <p class="text-[11px] text-slate-500">HR Manager</p>
            </div>

            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold">
                AR
            </div>
        </div>

    </div>
</header>

<aside id="sidebar"
    class="fixed top-16 left-0 z-40 h-[calc(100vh-64px)] w-[280px]
           bg-white border-r border-slate-200 shadow-xl
           transition-transform duration-300 ease-in-out
           -translate-x-full">

    <div class="h-full overflow-y-auto p-5">
        <ul class="nav-menu flex flex-col gap-2" id="sidebar-menu"></ul>
    </div>
</aside>

<div id="sidebarOverlay"
    class="fixed inset-0 bg-black/40 z-30 hidden top-16"></div>

        <div class="p-8">

            <div class="bg-white rounded-3xl p-8 border border-slate-100">
                <h2 class="font-semibold text-xl mb-6">Salary History</h2>
                
                <div class="space-y-6">
                    <!-- Latest Payslip -->
                    <div class="border border-slate-200 rounded-3xl p-8 hover:border-primary transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-medium">May 2026 Salary Slip</p>
                                <p class="text-sm text-slate-500">Paid on May 01, 2026</p>
                            </div>
                            <button onclick="alert('Payslip downloaded!')" 
                                    class="flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-2xl hover:bg-blue-700">
                                <span class="material-symbols-outlined">download</span>
                                Download
                            </button>
                        </div>
                        <div class="mt-6 grid grid-cols-3 gap-8 text-sm">
                            <div>
                                <p class="text-slate-500">Gross Pay</p>
                                <p class="text-2xl font-bold">$9,850</p>
                            </div>
                            <div>
                                <p class="text-slate-500">Deductions</p>
                                <p class="text-2xl font-bold text-red-600">-$1,400</p>
                            </div>
                            <div>
                                <p class="text-slate-500">Net Pay</p>
                                <p class="text-2xl font-bold text-emerald-600">$8,450</p>
                            </div>
                        </div>
                    </div>

                    <!-- Previous Months -->
                    
                <!-- Search Bar Card -->
                <div class="bg-white border border-slate-200 rounded-2xl shadow-sm px-5 py-4 flex items-center gap-3">
                    <span class="material-symbols-outlined text-slate-400 text-xl">search</span>
                    <input
                        type="text"
                        id="list-search-input"
                        placeholder="Search..."
                        class="flex-1 bg-transparent border-none outline-none text-sm text-slate-700 placeholder-slate-400"
                        oninput="filterListItems(this.value)"
                    />
                    <button onclick="document.getElementById('list-search-input').value='';filterListItems('')" class="text-slate-400 hover:text-slate-600 transition-colors">
                        <span class="material-symbols-outlined text-lg">close</span>
                    </button>
                </div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="border border-slate-200 rounded-3xl p-6 hover:border-primary transition cursor-pointer">
                            <p class="font-medium">April 2026</p>
                            <p class="text-emerald-600 font-bold mt-2">$8,320</p>
                            <button class="mt-4 text-xs text-primary">Download PDF →</button>
                        </div>
                        <div class="border border-slate-200 rounded-3xl p-6 hover:border-primary transition cursor-pointer">
                            <p class="font-medium">March 2026</p>
                            <p class="text-emerald-600 font-bold mt-2">$8,450</p>
                            <button class="mt-4 text-xs text-primary">Download PDF →</button>
                        </div>
                        <div class="border border-slate-200 rounded-3xl p-6 hover:border-primary transition cursor-pointer">
                            <p class="font-medium">February 2026</p>
                            <p class="text-emerald-600 font-bold mt-2">$8,200</p>
                            <button class="mt-4 text-xs text-primary">Download PDF →</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
    <script src="../../shared/js/utils.js"></script>

    <script src="../../shared/js/sidebar.js"></script>
    <script src="page.js"></script>
</body>
</html>
