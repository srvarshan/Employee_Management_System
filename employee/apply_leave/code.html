<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Apply Leave - HR Pulse</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Shared CSS -->

    <script>
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                primary: "#2563eb"
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="../../shared/css/styles.css">
    <link rel="stylesheet" href="page.css">
</head>

<body class="font-body-md text-on-surface antialiased overflow-hidden">
<div class="flex h-screen overflow-hidden">
<!-- MAIN CONTENT -->
    <main class="main-content flex-1 overflow-y-auto pt-16">

        
<header
    class="fixed top-0 left-0 right-0 z-50 h-16 bg-white border-b border-slate-200 shadow-sm flex items-center justify-between px-6">

    <div class="flex items-center gap-4">

        <button id="sidebarToggle"
            class="w-10 h-10 rounded-xl flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-700">menu</span>
        </button>
        <h1 class="text-lg font-bold text-slate-800" id="page-header-title">
            Corporate EMS
        </h1>

    </div>

    <div class="flex items-center gap-3">

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">notifications</span>
        </button>

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">settings</span>
        </button>

        <button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-slate-100 transition">
            <span class="material-symbols-outlined text-slate-600">help</span>
        </button>

        <div class="h-8 w-px bg-slate-200 mx-1"></div>

        <div class="flex items-center gap-3">
            <div class="hidden sm:block text-right">
                <p class="text-sm font-bold text-slate-900">Alex Rivera</p>
                <p class="text-[11px] text-slate-500">HR Manager</p>
            </div>

            <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold">
                AR
            </div>
        </div>

    </div>
</header>

<aside id="sidebar"
    class="fixed top-16 left-0 z-40 h-[calc(100vh-64px)] w-[280px]
           bg-white border-r border-slate-200 shadow-xl
           transition-transform duration-300 ease-in-out
           -translate-x-full">

    <div class="h-full overflow-y-auto p-5">
        <ul class="nav-menu flex flex-col gap-2" id="sidebar-menu"></ul>
    </div>
</aside>

<div id="sidebarOverlay"
    class="fixed inset-0 bg-black/40 z-30 hidden top-16"></div>

        <div class="p-8 max-w-2xl mx-auto">
            <div class="bg-white rounded-3xl shadow p-10">

                <h2 class="text-2xl font-semibold mb-8">New Leave Request</h2>

                <div class="space-y-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Leave Type</label>
                        <div class="grid grid-cols-3 gap-4">
                            <button class="border-2 border-primary text-primary py-4 rounded-2xl font-medium">Annual Leave</button>
                            <button class="border border-slate-300 py-4 rounded-2xl hover:border-slate-400">Sick Leave</button>
                            <button class="border border-slate-300 py-4 rounded-2xl hover:border-slate-400">Casual Leave</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Start Date</label>
                            <input type="date" class="w-full border border-slate-300 rounded-2xl px-6 py-4 focus:border-primary outline-none"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">End Date</label>
                            <input type="date" class="w-full border border-slate-300 rounded-2xl px-6 py-4 focus:border-primary outline-none"/>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Number of Days</label>
                        <input type="number" value="3" class="w-full border border-slate-300 rounded-2xl px-6 py-4 focus:border-primary outline-none"/>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Reason</label>
                        <textarea class="w-full border border-slate-300 rounded-3xl px-6 py-4 focus:border-primary outline-none h-32" placeholder="Please provide a reason for your leave..."></textarea>
                    </div>

                    <div class="flex justify-between pt-6">
                        <button onclick="history.back()" class="px-8 py-4 border border-slate-300 rounded-2xl font-medium">Cancel</button>
                        <button onclick="alert('Leave request submitted successfully! ✅ HR will review shortly.')" 
                                class="px-10 py-4 bg-primary text-white rounded-2xl font-medium hover:bg-blue-700 transition">
                            Submit Leave Request
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
    <script src="../../shared/js/utils.js"></script>

    <script src="../../shared/js/sidebar.js"></script>
    <script src="page.js"></script>
</body>
</html>
